name: ScrapNotePad
options:
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 5.9
    PRODUCT_NAME: ScrapNotePad
    TARGETED_DEVICE_FAMILY: 2
    SUPPORTS_MACCATALYST: NO
targets:
  ScrapNotePad:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ScrapNotePad
        excludes:
          - Resources/Assets.xcassets/**/Contents.json
    resources:
      - path: ScrapNotePad/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.juriohto.ScrapNotePad
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations~ipad: UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: スクラップノートに写真を貼り付けるために使用します。
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
    scheme:
      testTargets: []
